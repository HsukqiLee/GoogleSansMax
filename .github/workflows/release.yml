name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ZIP Artifact - ${{ matrix.variant.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - name: "Core"
            zip_name: "GoogleSansMax-Core.zip"
            include_unicode: false
            include_emoji: false
          - name: "Unicode-CBDT"
            zip_name: "GoogleSansMax-Unicode-CBDT.zip"
            include_unicode: true
            include_emoji: true
            emoji_url: "https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf"
          - name: "Unicode-COLRv1"
            zip_name: "GoogleSansMax-Unicode-COLRv1.zip"
            include_unicode: true
            include_emoji: true
            emoji_url: "https://github.com/googlefonts/noto-emoji/raw/main/fonts/Noto-COLRv1.ttf"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare build directory
        run: |
          mkdir -p build_dir
          # Copy everything except git, github workflows, and readmes
          rsync -av --exclude='.git' --exclude='.github' --exclude='README*' --exclude='build_dir' ./ build_dir/

      - name: Handle Unicode scripts (Core variant only)
        if: ${{ matrix.variant.include_unicode == false }}
        run: |
          rm -rf build_dir/lib
          rm -rf build_dir/font-source
          rm -rf build_dir/config
          rm -rf build_dir/lang
          rm -f build_dir/system/fonts/NotoSansSuper.otf
          rm -f build_dir/system/fonts/UFSTempAlpha.otf
          rm -f build_dir/system/fonts/UFSZeroExt.otf

      - name: Download Unicode Fonts
        if: ${{ matrix.variant.include_unicode == true }}
        run: |
          echo "Downloading Unicode Fonts..."
          mkdir -p build_dir/system/fonts
          
          declare -A files=(
            [SourceHanSansSC-Regular.otf]=https://github.com/adobe-fonts/source-han-sans/raw/release/OTF/SimplifiedChinese/SourceHanSansSC-Regular.otf
            [NotoUnicode.otf]=https://github.com/MY1L/Unicode/releases/download/NotoUni7/NotoUnicode-7.3.otf
            [NewGardiner.ttf]=https://github.com/Mercury13/unicodia/raw/main/Fonts/NewGardiner.ttf
            [UnicodiaDaarage.otf]=https://github.com/Mercury13/unicodia/raw/main/Fonts/UnicodiaDaarage.otf
            [UnicodiaSesh.ttf]=https://github.com/Mercury13/unicodia/raw/main/Fonts/UnicodiaSesh.ttf
            [PlangothicP1-Regular.otf]=https://github.com/Fitzgerald-Porthmouth-Koenigsegg/Plangothic_Project/raw/build/fonts/otf/PlangothicP1-Regular.otf
            [PlangothicP2-Regular.otf]=https://github.com/Fitzgerald-Porthmouth-Koenigsegg/Plangothic_Project/raw/build/fonts/otf/PlangothicP2-Regular.otf
            [KreativeSquare.ttf]=https://github.com/kreativekorp/open-relay/raw/master/KreativeSquare/KreativeSquare.ttf
            [TempSeal.ttf]=https://github.com/Losketch/Fonts/releases/download/TempSeal/TempSeal.ttf
            [LastResort-Regular.ttf]=https://github.com/unicode-org/last-resort-font/releases/latest/download/LastResort-Regular.ttf
            [NotoEmoji-Regular.ttf]=https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoEmoji-Regular.ttf
          )
          
          for name in "${!files[@]}"; do
            echo "⬇ Downloading $name..."
            wget --tries=3 -q "${files[$name]}" -O "build_dir/system/fonts/$name" || echo "⚠ Warning: Failed to download $name"
          done

      - name: Download Emoji Font (Unicode variants)
        if: ${{ matrix.variant.include_emoji == true }}
        run: |
          echo "Downloading Emoji Font..."
          wget --tries=3 -q "${{ matrix.variant.emoji_url }}" -O "build_dir/system/fonts/NotoColorEmoji.ttf"

      - name: Bump Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${GITHUB_REF_NAME}
          CURRENT_VERSION=$(grep '^version=' build_dir/module.prop | cut -d'=' -f2)
          if [ "$TAG_VERSION" != "$CURRENT_VERSION" ]; then
            echo "Bumping version from $CURRENT_VERSION to $TAG_VERSION"
            CURRENT_VCODE=$(grep '^versionCode=' build_dir/module.prop | cut -d'=' -f2)
            NEW_VCODE=$((CURRENT_VCODE + 1))
            sed -i "s/^version=.*/version=$TAG_VERSION/" build_dir/module.prop
            sed -i "s/^versionCode=.*/versionCode=$NEW_VCODE/" build_dir/module.prop
            
            if [ "${{ matrix.variant.name }}" == "Core" ]; then
              git fetch origin main
              git checkout main
              sed -i "s/^version=.*/version=$TAG_VERSION/" module.prop
              sed -i "s/^versionCode=.*/versionCode=$NEW_VCODE/" module.prop
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add module.prop
              git commit -m "chore: auto-bump version to $TAG_VERSION [skip ci]" || true
              git push origin main || true
              git checkout $GITHUB_REF_NAME
            fi
          fi

      - name: Build ZIP
        run: |
          cd build_dir
          zip -r9 "../${{ matrix.variant.zip_name }}" .
          cd ..

      - name: Upload as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant.zip_name }}
          path: ${{ matrix.variant.zip_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.variant.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
