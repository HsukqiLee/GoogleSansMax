name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # Stage 1a: Version bump + JSON update (single runner, no race)
  #   Runs in parallel with download-fonts
  # ==========================================
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and update JSONs
        id: version
        run: |
          TAG_VERSION=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME}"
          fi

          CURRENT_VCODE=$(grep '^versionCode=' module.prop | cut -d'=' -f2)
          CURRENT_VERSION=$(grep '^version=' module.prop | cut -d'=' -f2)

          if [ -n "$TAG_VERSION" ] && [ "$TAG_VERSION" != "$CURRENT_VERSION" ]; then
            NEW_VCODE=$((CURRENT_VCODE + 1))
          else
            NEW_VCODE=$CURRENT_VCODE
            TAG_VERSION="$CURRENT_VERSION"
          fi

          sed -i "s/^version=.*/version=$TAG_VERSION/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$NEW_VCODE/" module.prop

          # Generate changelog from commit history
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG_VERSION" ]; then
            echo "## What's New in $TAG_VERSION" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- \`%h\` %s" --no-merges >> CHANGELOG.md
          else
            echo "## What's New in $TAG_VERSION" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- \`%h\` %s" --no-merges -20 >> CHANGELOG.md
          fi
          echo "" >> CHANGELOG.md

          for variant in Core Unicode-CBDT Unicode-COLRv1; do
            cat > "update-${variant}.json" << JSONEOF
          {
            "version": "$TAG_VERSION",
            "versionCode": $NEW_VCODE,
            "zipUrl": "https://github.com/HsukqiLee/GoogleSansMax/releases/download/$TAG_VERSION/GoogleSansMax-${variant}.zip",
            "changelog": "https://raw.githubusercontent.com/HsukqiLee/GoogleSansMax/main/CHANGELOG.md"
          }
          JSONEOF
          done

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_VCODE" >> "$GITHUB_OUTPUT"

          echo "=== Version: $TAG_VERSION (code: $NEW_VCODE) ==="

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add module.prop update-*.json CHANGELOG.md
            git diff --cached --quiet || git commit -m "chore: auto-bump version and update JSONs to $TAG_VERSION [skip ci]"
            git push origin HEAD:main || true
          fi

      - name: Upload module.prop
        uses: actions/upload-artifact@v4
        with:
          name: module-prop
          path: module.prop
          retention-days: 1

  # ==========================================
  # Stage 1b: Build shared base + download fonts (runs in parallel with prepare)
  # ==========================================
  download-fonts:
    name: Download Shared Fonts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare shared base directory
        run: |
          mkdir -p build_dir/system/fonts
          rsync -av --exclude='.git/' --exclude='.github/' --exclude='README*' --exclude='CHANGELOG*' --exclude='build_dir' --exclude='update-*.json' --exclude='.gitignore' --exclude='references/' ./ build_dir/
          rm -rf build_dir/docs 2>/dev/null || true
          mkdir -p build_dir/webroot
          if [ -d "docs" ]; then
            cp -r docs/* build_dir/webroot/ 2>/dev/null || true
          fi
          # Also handle case where webroot is committed directly
          if [ -d "webroot" ]; then
            cp -r webroot/* build_dir/webroot/ 2>/dev/null || true
          fi

      - name: Download Noto Sans Mono VF
        run: |
          echo "Downloading Noto Sans Mono VF..."
          FONT_URL=$(curl -s -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900" | grep -oP 'url\(\K[^)]+' | head -1)
          if [ -n "$FONT_URL" ]; then
            curl -L --retry 3 -s "$FONT_URL" -o "build_dir/system/fonts/NotoSansMono-VF.ttf"
            echo "  NotoSansMono-VF.ttf: $(wc -c < build_dir/system/fonts/NotoSansMono-VF.ttf) bytes"
          else
            echo "  WARNING: Could not get Noto Sans Mono VF URL"
          fi

      - name: Download Noto Serif VF
        run: |
          echo "Downloading Noto Serif VF..."
          FONT_URL="https://raw.githubusercontent.com/notofonts/notofonts.github.io/main/fonts/NotoSerif/unhinted/ttf/NotoSerif%5Bwght%5D.ttf"
          curl -L --retry 3 -s "$FONT_URL" -o "build_dir/system/fonts/NotoSerif-VF.ttf" 2>/dev/null
          SIZE=$(wc -c < "build_dir/system/fonts/NotoSerif-VF.ttf" 2>/dev/null || echo "0")
          if [ "$SIZE" -lt 1000 ]; then
            echo "  Primary source failed, trying fallback..."
            curl -L --retry 3 -s "https://cdn.jsdelivr.net/fontsource/fonts/noto-serif@latest/latin-400-normal.ttf" \
              -o "build_dir/system/fonts/NotoSerif-VF.ttf" 2>/dev/null
          fi
          echo "  NotoSerif-VF.ttf: $(wc -c < build_dir/system/fonts/NotoSerif-VF.ttf) bytes"

      - name: Download CJK Black Static Fonts
        run: |
          echo "Downloading CJK Black static fonts for boundary weights 901-1000..."

          # Sans Black
          for URL in \
            "https://github.com/googlefonts/noto-cjk/releases/download/Sans2.004/07_NotoSansCJKkr.zip" \
            "https://github.com/googlefonts/noto-cjk/releases/download/Sans2.004/08_NotoSansCJKsc.zip" \
            "https://github.com/googlefonts/noto-cjk/releases/download/Sans2.004/09_NotoSansCJKtc.zip"; do
            FILENAME=$(basename "$URL" .zip)
            LANG=$(echo "$FILENAME" | grep -oP '(kr|sc|tc)')
            echo "  Sans Black: $LANG..."
            curl -L --retry 3 -s "$URL" -o "/tmp/$FILENAME.zip"
            unzip -q -o "/tmp/$FILENAME.zip" -d "/tmp/$FILENAME"
            cp "/tmp/$FILENAME/NotoSansCJK${LANG}-Black.otf" build_dir/system/fonts/
            rm -rf "/tmp/$FILENAME" "/tmp/$FILENAME.zip"
          done

          # Serif Black
          for URL in \
            "https://github.com/googlefonts/noto-cjk/releases/download/Serif2.003/08_NotoSerifCJKkr.zip" \
            "https://github.com/googlefonts/noto-cjk/releases/download/Serif2.003/09_NotoSerifCJKsc.zip" \
            "https://github.com/googlefonts/noto-cjk/releases/download/Serif2.003/10_NotoSerifCJKtc.zip"; do
            FILENAME=$(basename "$URL" .zip)
            LANG=$(echo "$FILENAME" | grep -oP '(kr|sc|tc)')
            echo "  Serif Black: $LANG..."
            curl -L --retry 3 -s "$URL" -o "/tmp/$FILENAME.zip"
            unzip -q -o "/tmp/$FILENAME.zip" -d "/tmp/$FILENAME"
            BLACK_FILE=$(find "/tmp/$FILENAME" -name "NotoSerifCJK${LANG}-Black.otf" | head -1)
            [ -n "$BLACK_FILE" ] && cp "$BLACK_FILE" build_dir/system/fonts/
            rm -rf "/tmp/$FILENAME" "/tmp/$FILENAME.zip"
          done

          echo "=== Shared fonts ==="
          ls -lh build_dir/system/fonts/

      - name: Upload shared base
        uses: actions/upload-artifact@v4
        with:
          name: shared-base
          path: build_dir/
          retention-days: 1

  # ==========================================
  # Stage 2: Build variants (matrix, depends on both Stage 1 jobs)
  # ==========================================
  build:
    name: Build ZIP - ${{ matrix.variant.name }}
    needs: [prepare, download-fonts]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - name: "Core"
            zip_name: "GoogleSansMax-Core.zip"
            include_unicode: false
            include_emoji: false
          - name: "Unicode-CBDT"
            zip_name: "GoogleSansMax-Unicode-CBDT.zip"
            include_unicode: true
            include_emoji: true
            emoji_url: "https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf"
          - name: "Unicode-COLRv1"
            zip_name: "GoogleSansMax-Unicode-COLRv1.zip"
            include_unicode: true
            include_emoji: true
            emoji_url: "https://github.com/googlefonts/noto-emoji/raw/main/fonts/Noto-COLRv1.ttf"

    steps:
      - name: Download shared base
        uses: actions/download-artifact@v4
        with:
          name: shared-base
          path: build_dir

      - name: Download module.prop
        uses: actions/download-artifact@v4
        with:
          name: module-prop
          path: base_prop

      - name: Apply variant config
        run: |
          cp base_prop/module.prop build_dir/module.prop
          sed -i "s/^name=.*/name=Google Sans Max (${{ matrix.variant.name }})/" build_dir/module.prop
          echo "updateJson=https://raw.githubusercontent.com/HsukqiLee/GoogleSansMax/main/update-${{ matrix.variant.name }}.json" >> build_dir/module.prop

      - name: Strip Unicode (Core only)
        if: ${{ matrix.variant.include_unicode == false }}
        run: |
          rm -rf build_dir/lib build_dir/font-source build_dir/config build_dir/lang
          rm -f build_dir/system/fonts/NotoSansSuper.otf build_dir/system/fonts/UFSTempAlpha.otf build_dir/system/fonts/UFSZeroExt.otf

      - name: Add Unicode fonts
        if: ${{ matrix.variant.include_unicode == true }}
        run: |
          echo "Downloading Unicode Fonts..."
          declare -A files=(
            [SourceHanSansSC-Regular.otf]=https://github.com/adobe-fonts/source-han-sans/raw/release/OTF/SimplifiedChinese/SourceHanSansSC-Regular.otf
            [NotoUnicode.otf]=https://github.com/MY1L/Unicode/releases/download/NotoUni7/NotoUnicode-7.3.otf
            [NewGardiner.ttf]=https://github.com/Mercury13/unicodia/raw/main/Fonts/NewGardiner.ttf
            [UnicodiaDaarage.otf]=https://github.com/Mercury13/unicodia/raw/main/Fonts/UnicodiaDaarage.otf
            [UnicodiaSesh.ttf]=https://github.com/Mercury13/unicodia/raw/main/Fonts/UnicodiaSesh.ttf
            [PlangothicP1-Regular.otf]=https://github.com/Fitzgerald-Porthmouth-Koenigsegg/Plangothic_Project/raw/build/fonts/otf/PlangothicP1-Regular.otf
            [PlangothicP2-Regular.otf]=https://github.com/Fitzgerald-Porthmouth-Koenigsegg/Plangothic_Project/raw/build/fonts/otf/PlangothicP2-Regular.otf
            [KreativeSquare.ttf]=https://github.com/kreativekorp/open-relay/raw/master/KreativeSquare/KreativeSquare.ttf
            [TempSeal.ttf]=https://github.com/Losketch/Fonts/releases/download/TempSeal/TempSeal.ttf
            [LastResort-Regular.ttf]=https://github.com/unicode-org/last-resort-font/releases/latest/download/LastResort-Regular.ttf
            [NotoEmoji-Regular.ttf]=https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoEmoji-Regular.ttf
          )
          for name in "${!files[@]}"; do
            wget --tries=3 -q "${files[$name]}" -O "build_dir/system/fonts/$name" || echo "Warning: Failed to download $name"
          done

      - name: Download Emoji
        if: ${{ matrix.variant.include_emoji == true }}
        run: wget --tries=3 -q "${{ matrix.variant.emoji_url }}" -O "build_dir/system/fonts/NotoColorEmoji.ttf"

      - name: Build ZIP
        run: cd build_dir && zip -r9 "../${{ matrix.variant.zip_name }}" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant.zip_name }}
          path: ${{ matrix.variant.zip_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.variant.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
