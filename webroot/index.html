<title>Google Sans Max</title>
<style>
@property --hue { syntax: '<integer>'; inherits: true; initial-value: 220; }
:root{
  --hue:220;--md-primary:hsl(var(--hue),70%,40%);--md-on-primary:#fff;
  --md-primary-container:hsl(var(--hue),80%,90%);--md-on-primary-container:hsl(var(--hue),80%,12%);
  --md-surface:hsl(var(--hue),10%,98%);--md-on-surface:hsl(var(--hue),10%,12%);
  --md-surface-variant:hsl(var(--hue),15%,90%);--md-on-surface-variant:hsl(var(--hue),10%,35%);
  --md-surface-container:hsl(var(--hue),10%,95%);--md-surface-container-high:hsl(var(--hue),10%,91%);
  --md-outline:hsl(var(--hue),10%,65%);--md-outline-variant:hsl(var(--hue),10%,82%);
  --md-radius:16px;
  --md-elev-1:0 1px 2px rgba(0,0,0,.1),0 1px 3px 1px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){:root{
  --md-primary:hsl(var(--hue),70%,80%);--md-on-primary:hsl(var(--hue),70%,20%);
  --md-primary-container:hsl(var(--hue),50%,30%);--md-on-primary-container:hsl(var(--hue),80%,90%);
  --md-surface:hsl(var(--hue),10%,12%);--md-on-surface:hsl(var(--hue),10%,90%);
  --md-surface-variant:hsl(var(--hue),10%,25%);--md-on-surface-variant:hsl(var(--hue),10%,70%);
  --md-surface-container:hsl(var(--hue),10%,16%);--md-surface-container-high:hsl(var(--hue),10%,20%);
  --md-outline:hsl(var(--hue),10%,50%);--md-outline-variant:hsl(var(--hue),10%,30%);
}}
@media(prefers-color-scheme:light){:root{
  --md-primary:var(--accent,#1a73e8);--md-on-primary:var(--on-accent,#fff);
  --md-primary-container:var(--accent-container,#d3e3fd);--md-on-primary-container:var(--on-accent-container,#062e6f);
}}
@media(prefers-color-scheme:dark){:root{
  --md-primary:var(--accent,#8ab4f8);--md-on-primary:var(--on-accent,#062e6f);
  --md-primary-container:var(--accent-container,#004a93);--md-on-primary-container:var(--accent-container-text,#d3e3fd);
}}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--md-surface);color:var(--md-on-surface);line-height:1.5;min-height:100vh}

.top-bar{position:sticky;top:0;z-index:20;height:56px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:var(--md-surface);border-bottom:1px solid var(--md-outline-variant)}
.top-bar-title{font-size:20px;font-weight:500;background:linear-gradient(135deg,var(--md-primary),hsl(350,80%,55%));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.top-bar-actions{display:flex;align-items:center;gap:8px}
.lang-current{height:28px;padding:0 10px;border-radius:14px;border:1px solid var(--md-outline);background:transparent;color:var(--md-on-surface-variant);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s}
.lang-current:hover{border-color:var(--md-primary);color:var(--md-primary)}
.lang-current svg{width:12px;height:12px;fill:currentColor;transition:transform .2s}
.lang-switcher{position:relative}
.lang-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--md-surface-container);border:1px solid var(--md-outline-variant);border-radius:12px;padding:4px 0;box-shadow:var(--md-elev-1);z-index:100;min-width:100px}
.lang-menu.open{display:block}
.lang-menu-item{display:block;width:100%;padding:8px 14px;border:none;background:none;color:var(--md-on-surface);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:background .15s}
.lang-menu-item:hover{background:var(--md-primary-container)}
.lang-menu-item.active{color:var(--md-primary);font-weight:600}

.tabs-bar{position:sticky;top:56px;z-index:18;display:flex;background:var(--md-surface);border-bottom:1px solid var(--md-outline-variant);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;min-width:44px;height:44px;background:none;border:none;color:var(--md-on-surface-variant);font-size:13px;font-weight:500;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;transition:color .2s;padding:0 12px;white-space:nowrap}
.tab-btn:hover{color:var(--md-on-surface)}
.tab-btn.active{color:var(--md-primary);font-weight:600}
.tab-indicator{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:3px;border-radius:3px 3px 0 0;background:var(--md-primary);transition:width .3s cubic-bezier(.4,0,.2,1)}
.tab-btn.active .tab-indicator{width:100%}

.content{max-width:880px;margin:0 auto;padding:16px}
.section-title{font-size:clamp(15px,2vw,20px);font-weight:500;margin:0 0 10px;color:var(--md-on-surface)}
.card{background:var(--md-surface-container);border-radius:var(--md-radius);padding:16px;margin-bottom:14px;box-shadow:var(--md-elev-1)}

.controls{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:8px;border:1px solid var(--md-outline);background:transparent;color:var(--md-on-surface);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.chip:hover{border-color:var(--md-primary);color:var(--md-primary)}
.chip.active{background:var(--md-primary-container);color:var(--md-on-primary-container);border-color:var(--md-primary-container)}

.slider-row{display:flex;align-items:center;gap:10px}
.slider-label{font-size:12px;font-weight:500;color:var(--md-on-surface-variant);min-width:56px}
.slider-track{flex:1;display:flex;align-items:center}
.slider-track input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:2px;outline:none;background:linear-gradient(to right,var(--md-primary) 0%,var(--md-primary) var(--fill-pct,50%),var(--md-outline-variant) var(--fill-pct,50%),var(--md-outline-variant) 100%);cursor:pointer}
.slider-track input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--md-primary);box-shadow:0 1px 3px rgba(0,0,0,.2),0 0 0 1px rgba(0,0,0,.04);cursor:pointer;transition:transform .15s,box-shadow .15s}
.slider-track input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15);box-shadow:0 1px 6px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.06)}
.slider-track input[type=range]::-webkit-slider-thumb:active{transform:scale(1.25)}
.slider-track input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--md-primary);border:none;box-shadow:0 1px 3px rgba(0,0,0,.2),0 0 0 1px rgba(0,0,0,.04);cursor:pointer}
.slider-val{font-size:12px;font-weight:700;color:var(--md-primary);min-width:28px;text-align:center;font-family:'SF Mono',Monaco,Consolas,monospace}
.md-input{width:100%;height:40px;border:1px solid var(--md-outline);border-radius:12px;padding:0 14px;font-size:13px;background:var(--md-surface-container);color:var(--md-on-surface);outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.md-input:focus{border-color:var(--md-primary);box-shadow:0 0 0 1px var(--md-primary)}
.md-input::placeholder{color:var(--md-on-surface-variant);opacity:.6}

.weight-section-label{font-size:11px;font-weight:600;color:var(--md-on-surface-variant);text-transform:uppercase;letter-spacing:.5px;padding:10px 0 4px;border-top:1px solid var(--md-outline-variant);margin-top:8px}
.weight-section-label:first-child{border-top:none;margin-top:0;padding-top:0}

.weight-grid{}
.weight-row{display:grid;grid-template-columns:40px 1fr;gap:6px;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--md-outline-variant)}
.weight-row:last-child{border-bottom:none}
.weight-num{font-size:11px;font-weight:600;color:var(--md-primary);font-family:'SF Mono',Monaco,Consolas,monospace}
.weight-text{font-size:clamp(14px,2.2vw,20px);line-height:1.4;word-break:break-all}

.compare-separator{padding:12px 0 6px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--md-on-surface-variant);font-weight:600}

.cjk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.cjk-card{background:var(--md-surface-container-high);border-radius:10px;padding:12px}
.cjk-label{display:block;font-size:12px;font-weight:600;color:var(--md-primary);margin-bottom:3px}
.cjk-text{font-size:14px;line-height:1.7}

.vf-preview{margin:12px 0;padding:14px;background:var(--md-surface-container-high);border-radius:12px}
.vf-preview-title{font-size:11px;font-weight:600;color:var(--md-primary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.vf-preview-text{font-size:clamp(20px,4vw,36px);line-height:1.3;word-break:break-all}

.charset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:2px}
.charset-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border:1px solid var(--md-outline-variant);border-radius:6px;font-size:14px;cursor:default;position:relative;transition:all .15s}
.charset-cell:hover{border-color:var(--md-primary);transform:scale(1.1);z-index:1}
.charset-cell .tip{display:none;position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);background:var(--md-on-surface);color:var(--md-surface);padding:2px 5px;border-radius:4px;font-size:9px;white-space:nowrap;z-index:100}
.charset-cell:hover .tip{display:block}

.cjk-ext-item{margin-bottom:8px}
.cjk-ext-label{font-size:12px;font-weight:600;color:var(--md-primary);margin-bottom:2px}
.cjk-ext-text{font-size:14px;line-height:1.6;word-break:break-all}

.glyph-table{width:100%;border-collapse:collapse;font-size:14px}
.glyph-table th{font-size:11px;font-weight:600;color:var(--md-on-surface-variant);text-transform:uppercase;letter-spacing:.3px;padding:6px 8px;text-align:center;border-bottom:2px solid var(--md-outline-variant)}
.glyph-table td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--md-outline-variant);font-size:18px;line-height:1.6}

.coverage-bar{height:6px;border-radius:3px;background:var(--md-outline-variant);overflow:hidden;margin:4px 0}
.coverage-fill{height:100%;border-radius:3px;transition:width .3s}
.coverage-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.coverage-name{min-width:120px;font-weight:500}
.coverage-pct{min-width:40px;text-align:right;font-family:'SF Mono',Monaco,Consolas,monospace;font-weight:600}
.coverage-grade{min-width:24px;text-align:center;font-weight:700;border-radius:4px;padding:1px 4px;font-size:11px}
.grade-PG{background:#00BCD4;color:#fff}.grade-EX{background:#4CAF50;color:#fff}
.grade-A{background:#8BC34A;color:#000}.grade-B{background:#CDDC39;color:#000}
.grade-C{background:#FFEB3B;color:#000}.grade-D{background:#FFC107;color:#000}
.grade-E{background:#FF9800;color:#fff}.grade-F{background:#F44336;color:#fff}

.progress-bar{width:100%;height:8px;border-radius:4px;background:var(--md-outline-variant);overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;background:var(--md-primary);transition:width .1s}

.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 20px;border-radius:20px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--md-primary);color:var(--md-on-primary)}
.btn-primary:hover{box-shadow:var(--md-elev-1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--md-outline);color:var(--md-on-surface)}
.btn-outline.active{background:var(--md-primary-container);color:var(--md-on-primary-container);border-color:var(--md-primary-container)}

.footer{text-align:center;padding:16px;color:var(--md-on-surface-variant);font-size:11px;border-top:1px solid var(--md-outline-variant);margin-top:14px}

@media(max-width:640px){
  .tab-btn{font-size:11px;padding:0 10px}
  .weight-row{grid-template-columns:32px 1fr}
  .slider-row{flex-direction:column;align-items:stretch;gap:3px}
  .slider-label{min-width:0}
}

/* ==========================================

function renderWeightGrid(parent,fontFamily,weights,text,fontSize){

  });

  weights.forEach(w=>{
    const row=h('div','weight-row');row.append(h('span','weight-num',w+'i'));

    if(fontSize)tEl.style.fontSize=fontSize+'px';

  });

}

  progDiv.append(previewBox);covCard.append(progDiv);
  const currentResults=S.coverageMode==='unihan'?S.coverageResultsUnihan:S.coverageResultsUnicode;
  if(currentResults){const resDiv=h('div','');resDiv.style.marginTop='8px';
    currentResults.forEach(bl=>{
      if(S.coverageHidePerfect&&bl.pct===100)return;
      const row=h('div','coverage-row');
      row.append(h('span','coverage-name',bl.name));
      const bar=h('div','coverage-bar');const fill=h('div','coverage-fill');fill.style.width=bl.pct+'%';fill.style.background=gradeColor(bl.grade);bar.append(fill);row.append(bar);
      row.append(h('span','coverage-pct',bl.pct+'%'));
      const gv=h('span','coverage-grade grade-'+bl.grade,bl.grade);row.append(gv);
      resDiv.append(row)});
    covCard.append(resDiv)}
  runBtn.onclick=async()=>{
    if(S.coverageRunning)return;S.coverageRunning=true;runBtn.textContent=t('testing');runBtn.disabled=true;
    if(S.coverageMode==='unihan')S.coverageResultsUnihan=[];else S.coverageResultsUnicode=[];
    S.coverageProgress=0;S.coveragePreview='';S.coverageCurrentCP='';
    if(S.coverageRunning){unihanBtn.style.opacity='0.4';unihanBtn.style.pointerEvents='none';unicodeBtn.style.opacity='0.4';unicodeBtn.style.pointerEvents='none';hideBtn.style.opacity='0.4';hideBtn.style.pointerEvents='none'}
    const blocks=S.coverageMode==='unihan'?UNIHAN_BLOCKS:COVERAGE_BLOCKS;
    const total=blocks.reduce((s,b)=>s+(b.end-b.start+1),0);let tested=0;let previewChars='';
    const gc=document.createElement('canvas');gc.width=48;gc.height=48;const gx=gc.getContext('2d',{willReadFrequently:true});
    gx.fillStyle='#fff';gx.fillRect(0,0,48,48);gx.fillStyle='#000';gx.font='32px sans-serif';gx.textBaseline='middle';gx.textAlign='center';
    gx.fillText('\uFFFF',24,24);const tofuRef=gx.getImageData(0,0,48,48).data;
    function hasGlyph(c){
      gx.fillStyle='#fff';gx.fillRect(0,0,48,48);gx.fillStyle='#000';gx.fillText(c,24,24);
      const d=gx.getImageData(0,0,48,48).data;let diff=0;
      for(let i=0;i<d.length;i+=4)diff+=Math.abs(d[i]-tofuRef[i]);
      return diff>1024}
    for(const block of blocks){
      let supported=0;const blockTotal=block.end-block.start+1;
      for(let cp=block.start;cp<=block.end;cp++){
        const ch=String.fromCodePoint(cp);
        if(hasGlyph(ch))supported++;
        tested++;S.coverageProgress=Math.round(tested/total*100);
        previewChars=ch+previewChars;if(previewChars.length>128)previewChars=previewChars.slice(0,128);
        S.coverageCurrentCP=ch+' U+'+cp.toString(16).toUpperCase().padStart(4,'0');
        if(tested%200===0){progFill.style.width=S.coverageProgress+'%';progText.textContent=S.coverageProgress+'% — '+block.name;previewBox.textContent=S.coverageCurrentCP;const pSpan=h('span','');pSpan.style.cssText='display:block;font-size:28px;line-height:1.4;word-break:break-all';pSpan.textContent=previewChars;previewBox.textContent='';previewBox.append(h('div','',S.coverageCurrentCP),pSpan);await new Promise(r=>requestAnimationFrame(r))}}
      const pct=Math.round(supported/blockTotal*100);
      const result={name:block.name,pct,grade:gradeBlock(pct)};
      if(S.coverageMode==='unihan')S.coverageResultsUnihan.push(result);else S.coverageResultsUnicode.push(result)}
    S.coverageRunning=false;runBtn.textContent=t('runTest');runBtn.disabled=false;unihanBtn.style.opacity='';unihanBtn.style.pointerEvents='';unicodeBtn.style.opacity='';unicodeBtn.style.pointerEvents='';hideBtn.style.opacity='';hideBtn.style.pointerEvents='';progFill.style.width='100%';progText.textContent='100% — '+t('coverageResult');S.coveragePreview='';S.coverageCurrentCP='';
    render()};
  parent.append(covCard);
}

/* ==========================================
   Navigation
   ========================================== */
document.getElementById('tabsBar').addEventListener('click',e=>{const btn=e.target.closest('.tab-btn');if(!btn)return;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');S.tab=btn.dataset.tab;render()});

render();
</script>
