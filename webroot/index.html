<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=compare">
<meta name="color-scheme" content="light dark">
<title>Google Sans Max</title>
<style>
/* ==========================================
   MD3 Design Tokens + Monet Dynamic Colors
   ========================================== */
@property --hue { syntax: '<integer>'; inherits: true; initial-value: 220; }
:root{
  --hue:220;
  --md-primary:hsl(var(--hue),70%,40%);
  --md-on-primary:#fff;
  --md-primary-container:hsl(var(--hue),80%,90%);
  --md-on-primary-container:hsl(var(--hue),80%,12%);
  --md-surface:hsl(var(--hue),10%,98%);
  --md-on-surface:hsl(var(--hue),10%,12%);
  --md-surface-variant:hsl(var(--hue),15%,90%);
  --md-on-surface-variant:hsl(var(--hue),10%,35%);
  --md-surface-container:hsl(var(--hue),10%,95%);
  --md-surface-container-high:hsl(var(--hue),10%,91%);
  --md-outline:hsl(var(--hue),10%,65%);
  --md-outline-variant:hsl(var(--hue),10%,82%);
  --md-radius:16px;
  --md-elev-1:0 1px 2px rgba(0,0,0,.1),0 1px 3px 1px rgba(0,0,0,.06);
  --md-elev-2:0 1px 2px rgba(0,0,0,.1),0 2px 6px 2px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){:root{
  --md-primary:hsl(var(--hue),70%,80%);
  --md-on-primary:hsl(var(--hue),70%,20%);
  --md-primary-container:hsl(var(--hue),50%,30%);
  --md-on-primary-container:hsl(var(--hue),80%,90%);
  --md-surface:hsl(var(--hue),10%,12%);
  --md-on-surface:hsl(var(--hue),10%,90%);
  --md-surface-variant:hsl(var(--hue),10%,25%);
  --md-on-surface-variant:hsl(var(--hue),10%,70%);
  --md-surface-container:hsl(var(--hue),10%,16%);
  --md-surface-container-high:hsl(var(--hue),10%,20%);
  --md-outline:hsl(var(--hue),10%,50%);
  --md-outline-variant:hsl(var(--hue),10%,30%);
}}
/* Monet: apply system accent if available (Android WebView) */
@media(prefers-color-scheme:light){
  :root{
    --md-primary:var(--accent,#1a73e8);
    --md-on-primary:var(--on-accent,#fff);
    --md-primary-container:var(--accent-container,#d3e3fd);
    --md-on-primary-container:var(--on-accent-container,#062e6f);
  }
}
@media(prefers-color-scheme:dark){
  :root{
    --md-primary:var(--accent,#8ab4f8);
    --md-on-primary:var(--on-accent,#062e6f);
    --md-primary-container:var(--accent-container,#004a93);
    --md-on-primary-container:var(--accent-container-text,#d3e3fd);
  }
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  background:var(--md-surface);color:var(--md-on-surface);
  line-height:1.5;min-height:100vh;
  transition:background .3s,color .3s;
}

/* Top App Bar */
.top-bar{
  position:sticky;top:0;z-index:20;
  height:64px;padding:0 16px;
  display:flex;align-items:center;
  background:var(--md-surface);
  border-bottom:1px solid var(--md-outline-variant);
}
.top-bar-title{
  font-size:22px;font-weight:400;
  background:linear-gradient(135deg,var(--md-primary),hsl(350,80%,55%));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* MD3 Tabs */
.tabs-bar{
  position:sticky;top:64px;z-index:19;
  display:flex;
  background:var(--md-surface);
  border-bottom:1px solid var(--md-outline-variant);
  overflow-x:auto;scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{
  flex:1;min-width:0;height:48px;
  background:none;border:none;
  color:var(--md-on-surface-variant);
  font-size:14px;font-weight:500;
  cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;
  transition:color .2s;
  -webkit-tap-highlight-color:transparent;
  padding:0 6px;white-space:nowrap;
}
.tab-btn:hover{color:var(--md-on-surface)}
.tab-btn.active{color:var(--md-primary);font-weight:600}
.tab-indicator{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:0;height:3px;border-radius:3px 3px 0 0;
  background:var(--md-primary);
  transition:width .3s cubic-bezier(.4,0,.2,1);
}
.tab-btn.active .tab-indicator{width:100%}

/* Content */
.content{max-width:880px;margin:0 auto;padding:16px}

/* Section title */
.section-title{
  font-size:clamp(16px,2vw,22px);font-weight:500;
  margin:0 0 12px;color:var(--md-on-surface);
}

/* MD3 Card */
.card{
  background:var(--md-surface-container);
  border-radius:var(--md-radius);
  padding:20px;margin-bottom:16px;
  box-shadow:var(--md-elev-1);
  transition:box-shadow .2s;
}

/* Controls */
.controls{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  display:inline-flex;align-items:center;
  padding:6px 14px;border-radius:8px;
  border:1px solid var(--md-outline);
  background:transparent;color:var(--md-on-surface);
  font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.chip:hover{border-color:var(--md-primary);color:var(--md-primary)}
.chip.active{
  background:var(--md-primary-container);
  color:var(--md-on-primary-container);
  border-color:var(--md-primary-container);
}

/* Slider */
.slider-group{display:flex;flex-direction:column;gap:6px}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-label{font-size:13px;font-weight:500;color:var(--md-on-surface-variant);min-width:64px}
.slider-track{flex:1;display:flex;align-items:center;gap:8px}
.slider-track input[type=range]{
  flex:1;height:4px;
  accent-color:var(--md-primary);
  cursor:pointer;
}
.slider-val{
  font-size:13px;font-weight:700;color:var(--md-primary);
  min-width:28px;text-align:center;
  font-family:'SF Mono',Monaco,Consolas,monospace;
}

/* Weight display */
.weight-grid{}
.weight-row{
  display:grid;grid-template-columns:48px 1fr;gap:8px;
  align-items:baseline;padding:6px 0;
  border-bottom:1px solid var(--md-outline-variant);
}
.weight-row:last-child{border-bottom:none}
.weight-num{
  font-size:12px;font-weight:600;color:var(--md-primary);
  font-family:'SF Mono',Monaco,Consolas,monospace;
}
.weight-text{font-size:clamp(16px,2.5vw,24px);line-height:1.4;word-break:break-all}

/* CJK */
.cjk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.cjk-card{
  background:var(--md-surface-container-high);
  border-radius:12px;padding:14px;
}
.cjk-label{display:block;font-size:13px;font-weight:600;color:var(--md-primary);margin-bottom:4px}
.cjk-text{font-size:15px;line-height:1.7}

/* Charset */
.charset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:3px}
.charset-cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--md-outline-variant);border-radius:8px;
  font-size:16px;cursor:default;position:relative;
  transition:all .15s;
}
.charset-cell:hover{border-color:var(--md-primary);transform:scale(1.1);z-index:1}
.charset-cell .tip{
  display:none;position:absolute;bottom:calc(100% + 4px);left:50%;
  transform:translateX(-50%);
  background:var(--md-on-surface);color:var(--md-surface);
  padding:3px 7px;border-radius:5px;font-size:10px;white-space:nowrap;z-index:100;
}
.charset-cell:hover .tip{display:block}

/* Footer */
.footer{
  text-align:center;padding:20px;
  color:var(--md-on-surface-variant);font-size:12px;
  border-top:1px solid var(--md-outline-variant);
  margin-top:16px;
}

/* Responsive */
@media(max-width:640px){
  .tab-btn{font-size:12px;padding:0 4px}
  .weight-row{grid-template-columns:36px 1fr}
  .slider-row{flex-direction:column;align-items:stretch;gap:4px}
  .slider-label{min-width:0}
}
</style>
</head>
<body>

<header class="top-bar">
  <div class="top-bar-title">Google Sans Max</div>
</header>

<nav class="tabs-bar" id="tabsBar">
  <button class="tab-btn active" data-tab="sans">Sans<span class="tab-indicator"></span></button>
  <button class="tab-btn" data-tab="serif">Serif<span class="tab-indicator"></span></button>
  <button class="tab-btn" data-tab="mono">Mono<span class="tab-indicator"></span></button>
  <button class="tab-btn" data-tab="cjk">CJK<span class="tab-indicator"></span></button>
  <button class="tab-btn" data-tab="compare">Compare<span class="tab-indicator"></span></button>
  <button class="tab-btn" data-tab="charset">Charset<span class="tab-indicator"></span></button>
</nav>

<main class="content" id="app"></main>

<footer class="footer">
  Google Sans Max &mdash; Weight 100&ndash;1000 &bull; Latin + CJK &bull; Sans + Serif + Mono
</footer>

<script>
/* ==========================================
   Data
   ========================================== */
const FONTS={
  sans:{family:'sans-serif',weights:range(100,1000),label:'Sans-Serif (Google Sans Flex)',italic:true},
  serif:{family:'serif',weights:range(100,900),label:'Serif (Noto Serif)',italic:true},
  mono:{family:'monospace',weights:range(100,1000),label:'Monospace (Noto Sans Mono)',italic:false},
};
const CJK_DATA={
  'zh-Hans':{label:'简体中文',sample:'天地玄黄 宇宙洪荒 日月盈昃 辰宿列张 寒来暑往 秋收冬藏',serif:'风急天高猿啸哀 渚清沙白鸟飞回 无边落木萧萧下 不尽长江滚滚来'},
  'zh-Hant':{label:'繁體中文',sample:'天地玄黃 宇宙洪荒 日月盈昃 辰宿列張 寒來暑往 秋收冬藏',serif:'風急天高猿嘯哀 渚清沙白鳥飛回 無邊落木蕭蕭下 不盡長江滾滾來'},
  'ja':{label:'日本語',sample:'いろはにほへと ちりぬるを わかよたれそ つねならむ',serif:'吾輩は猫である 名前はまだ無い'},
  'ko':{label:'한국어',sample:'나의 이름은 김철수입니다 한국어 테스트',serif:'백두산이 마르고 닳도록 하느님이 보우하사'},
};
const SAMPLES={sans:'The quick brown fox jumps over the lazy dog 0123456789',serif:'Pack my box with five dozen liquor jugs 0123456789',mono:'const fn = () => Math.PI * 2; // 6.283'};
const HENTAIGANA=Array.from({length:256},(_,i)=>String.fromCodePoint(0x1B001+i)).join('');
const CHARSET=[
  {label:'Latin',start:0x0020,end:0x007E},
  {label:'Latin Ext',start:0x00C0,end:0x024F},
  {label:'CJK',start:0x4E00,end:0x4E8F},
  {label:'CJK Ext-A',start:0x3400,end:0x4DBF},
  {label:'假名',start:0x3040,end:0x30FF},
  {label:'谚文',start:0xAC00,end:0xD7AF},
  {label:'符号',start:0x2000,end:0x2BFF},
];

/* ==========================================
   Utils
   ========================================== */
function range(a,b){const r=[];for(let i=a;i<=b;i++)r.push(i);return r}
function pickWeights(all,min,max,limit=20){
  const f=all.filter(w=>w>=min&&w<=max);
  if(f.length<=limit)return f;
  const s=Math.ceil(f.length/limit);
  const p=f.filter((_,i)=>i%s===0);
  if(p[p.length-1]!==f[f.length-1])p.push(f[f.length-1]);
  return p;
}
function h(tag,cls,txt){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt)e.textContent=txt;
  return e;
}

/* ==========================================
   State
   ========================================== */
const S={tab:'sans',sansRange:[100,1000],serifRange:[100,900],monoRange:[100,1000],
  cjkLang:'zh-Hans',cjkType:'sans',cjkRange:[100,1000],
  compareFont:'sans',compareItalic:false,
  charsetRange:'latin'};

/* ==========================================
   Render
   ========================================== */
const app=document.getElementById('app');

function render(){
  app.innerHTML='';
  ({sans:renderFont,serif:renderFont,mono:renderFont,cjk:renderCJK,compare:renderCompare,charset:renderCharset})[S.tab]?.(app);
}

function renderFontSection(card,key){
  const font=FONTS[key];
  const rKey=key+'Range';
  const [mn,mx]=S[rKey];

  // Controls
  const ctrl=h('div','controls');

  // Slider group
  const sg=h('div','slider-group');

  // Min row
  const minRow=h('div','slider-row');
  minRow.append(h('span','slider-label','最小字重'));
  const minV=h('span','slider-val',String(mn));
  minRow.append(minV);
  const minTrack=h('div','slider-track');
  const minIn=document.createElement('input');
  minIn.type='range';minIn.min=font.weights[0];minIn.max=font.weights[font.weights.length-1];minIn.value=mn;
  minTrack.append(minIn);
  minRow.append(minTrack);

  // Max row
  const maxRow=h('div','slider-row');
  maxRow.append(h('span','slider-label','最大字重'));
  const maxV=h('span','slider-val',String(mx));
  maxRow.append(maxV);
  const maxTrack=h('div','slider-track');
  const maxIn=document.createElement('input');
  maxIn.type='range';maxIn.min=font.weights[0];maxIn.max=font.weights[font.weights.length-1];maxIn.value=mx;
  maxTrack.append(maxIn);
  maxRow.append(maxTrack);

  sg.append(minRow,maxRow);
  ctrl.append(sg);
  card.append(ctrl);

  // Weight grid
  const grid=h('div','weight-grid');
  card.append(grid);

  function updateGrid(){
    const [a,b]=S[rKey];
    const weights=pickWeights(font.weights,a,b);
    grid.innerHTML='';
    weights.forEach(w=>{
      const row=h('div','weight-row');
      row.append(h('span','weight-num',String(w)));
      const t=h('div','weight-text');
      t.style.fontWeight=w;t.style.fontFamily=font.family;
      t.textContent=SAMPLES[key];
      row.append(t);
      grid.append(row);
      if(font.italic){
        const ri=h('div','weight-row');
        ri.append(h('span','weight-num',w+'i'));
        const ti=h('div','weight-text');
        ti.style.fontWeight=w;ti.style.fontFamily=font.family;ti.style.fontStyle='italic';
        ti.textContent=SAMPLES[key];
        ri.append(ti);
        grid.append(ri);
      }
    });
  }
  updateGrid();

  // Slider events — update grid only, no full re-render
  minIn.addEventListener('input',()=>{
    const v=parseInt(minIn.value);
    S[rKey]=[v,Math.max(v,S[rKey][1])];
    minV.textContent=v;
    updateGrid();
  });
  maxIn.addEventListener('input',()=>{
    const v=parseInt(maxIn.value);
    S[rKey]=[Math.min(S[rKey][0],v),v];
    maxV.textContent=v;
    updateGrid();
  });
}

function renderFont(parent){
  parent.append(h('h2','section-title',FONTS[S.tab].label));
  const card=h('div','card');
  renderFontSection(card,S.tab);
  parent.append(card);
}

function renderCJK(parent){
  parent.append(h('h2','section-title','CJK'));
  const card=h('div','card');

  // Controls
  const ctrl=h('div','controls');

  // Language chips
  const langRow=h('div','chip-row');
  Object.entries(CJK_DATA).forEach(([code,d])=>{
    const c=h('span','chip'+(S.cjkLang===code?' active':''),d.label);
    c.onclick=()=>{S.cjkLang=code;render()};
    langRow.append(c);
  });

  // Type chips
  const typeRow=h('div','chip-row');
  ['sans','serif'].forEach(t=>{
    const c=h('span','chip'+(S.cjkType===t?' active':''),t==='sans'?'无衬线':'衬线');
    c.onclick=()=>{S.cjkType=t;render()};
    typeRow.append(c);
  });

  // Slider group
  const sg=h('div','slider-group');
  const minRow=h('div','slider-row');
  minRow.append(h('span','slider-label','最小字重'));
  const minV=h('span','slider-val',String(S.cjkRange[0]));
  minRow.append(minV);
  const minTrack=h('div','slider-track');
  const minIn=document.createElement('input');
  minIn.type='range';minIn.min=100;minIn.max=1000;minIn.value=S.cjkRange[0];
  minTrack.append(minIn);
  minRow.append(minTrack);

  const maxRow=h('div','slider-row');
  maxRow.append(h('span','slider-label','最大字重'));
  const maxV=h('span','slider-val',String(S.cjkRange[1]));
  maxRow.append(maxV);
  const maxTrack=h('div','slider-track');
  const maxIn=document.createElement('input');
  maxIn.type='range';maxIn.min=100;maxIn.max=1000;maxIn.value=S.cjkRange[1];
  maxTrack.append(maxIn);
  maxRow.append(maxTrack);

  sg.append(minRow,maxRow);
  ctrl.append(langRow,typeRow,sg);
  card.append(ctrl);

  // Weight grid
  const grid=h('div','weight-grid');
  card.append(grid);

  function updateGrid(){
    const d=CJK_DATA[S.cjkLang];
    const sample=S.cjkType==='serif'?d.serif:d.sample;
    const weights=pickWeights(range(100,1000),S.cjkRange[0],S.cjkRange[1]);
    grid.innerHTML='';
    weights.forEach(w=>{
      const row=h('div','weight-row');
      row.append(h('span','weight-num',String(w)));
      const t=h('div','weight-text');
      t.style.fontWeight=w;t.style.fontFamily='sans-serif';
      t.textContent=sample;
      row.append(t);
      grid.append(row);
    });
  }
  updateGrid();

  minIn.addEventListener('input',()=>{
    const v=parseInt(minIn.value);
    S.cjkRange=[v,Math.max(v,S.cjkRange[1])];
    minV.textContent=v;updateGrid();
  });
  maxIn.addEventListener('input',()=>{
    const v=parseInt(maxIn.value);
    S.cjkRange=[Math.min(S.cjkRange[0],v),v];
    maxV.textContent=v;updateGrid();
  });

  parent.append(card);

  // Hentaigana
  parent.append(h('h2','section-title','Hentaigana (変体仮名)'));
  const hCard=h('div','card');
  const hGrid=h('div','weight-grid');
  pickWeights(range(100,1000),S.cjkRange[0],S.cjkRange[1],15).forEach(w=>{
    const row=h('div','weight-row');
    row.append(h('span','weight-num',String(w)));
    const t=h('div','weight-text');
    t.style.fontWeight=w;t.style.fontFamily='sans-serif';t.style.fontSize='18px';
    t.textContent=HENTAIGANA;
    row.append(t);hGrid.append(row);
  });
  hCard.append(hGrid);parent.append(hCard);
}

function renderCompare(parent){
  parent.append(h('h2','section-title','Weight Comparison'));
  const card=h('div','card');

  const ctrl=h('div','controls');
  const fontRow=h('div','chip-row');
  Object.entries(FONTS).forEach(([k,f])=>{
    const c=h('span','chip'+(S.compareFont===k?' active':''),k[0].toUpperCase()+k.slice(1));
    c.onclick=()=>{S.compareFont=k;render()};
    fontRow.append(c);
  });
  const itC=h('span','chip'+(S.compareItalic?' active':''),'Italic');
  itC.onclick=()=>{S.compareItalic=!S.compareItalic;render()};
  ctrl.append(fontRow,h('div','chip-row',itC));
  card.append(ctrl);

  const font=FONTS[S.compareFont];
  const weights=[100,200,300,400,500,600,700,800,900,1000].filter(w=>font.weights.includes(w));
  const sample=SAMPLES[S.compareFont];
  const grid=h('div','weight-grid');

  weights.forEach(w=>{
    const row=h('div','weight-row');
    row.append(h('span','weight-num',String(w)));
    const t=h('div','weight-text');
    t.style.fontWeight=w;t.style.fontFamily=font.family;
    if(S.compareItalic)t.style.fontStyle='italic';
    t.textContent=sample;row.append(t);grid.append(row);
  });

  if(S.compareFont==='sans'||S.compareFont==='serif'){
    const sep=h('div');
    sep.style.cssText='padding:12px 0 4px;font-size:12px;color:var(--md-on-surface-variant);font-weight:600';
    sep.textContent='CJK Sample';grid.append(sep);
    const cjkSample=S.compareFont==='serif'?CJK_DATA['zh-Hans'].serif:CJK_DATA['zh-Hans'].sample;
    weights.forEach(w=>{
      const row=h('div','weight-row');
      row.append(h('span','weight-num',String(w)));
      const t=h('div','weight-text');
      t.style.fontWeight=w;t.style.fontFamily='sans-serif';
      if(S.compareItalic)t.style.fontStyle='italic';
      t.textContent=cjkSample;row.append(t);grid.append(row);
    });
  }

  card.append(grid);parent.append(card);
}

function renderCharset(parent){
  parent.append(h('h2','section-title','Character Coverage'));
  const card=h('div','card');
  const ctrl=h('div','controls');
  const chipRow=h('div','chip-row');
  CHARSET.forEach(r=>{
    const c=h('span','chip'+(S.charsetRange===r.label?' active':''),r.label);
    c.onclick=()=>{S.charsetRange=r.label;render()};
    chipRow.append(c);
  });
  ctrl.append(chipRow);card.append(ctrl);

  const grid=h('div','charset-grid');
  const range=CHARSET.find(r=>r.label===S.charsetRange)||CHARSET[0];
  const count=Math.min(range.end-range.start+1,500);
  for(let i=0;i<count;i++){
    const code=range.start+i;
    const cell=h('div','charset-cell');
    cell.textContent=String.fromCodePoint(code);
    const tip=h('span','tip','U+'+code.toString(16).toUpperCase().padStart(4,'0'));
    cell.append(tip);grid.append(cell);
  }
  card.append(grid);parent.append(card);
}

/* ==========================================
   Navigation
   ========================================== */
document.getElementById('tabsBar').addEventListener('click',e=>{
  const btn=e.target.closest('.tab-btn');
  if(!btn)return;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  S.tab=btn.dataset.tab;
  render();
});

/* ==========================================
   Init
   ========================================== */
render();
</script>
</body>
